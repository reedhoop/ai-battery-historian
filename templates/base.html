<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>
      (function () {
        try {
          var t = localStorage.getItem('bh-theme');
          if (!t) {
            t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
    {{if .UseCDN}}
    <!-- 外部 CDN 模式（--use_cdn 开启）：资源从 bootcdn.net 加载，需联网 -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/jqueryui/1.11.4/themes/hot-sneaks/jquery-ui.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/jqueryui/1.11.2/jquery-ui.min.js"></script>

    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/select2/3.5.4/select2.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/jquery-contextmenu/1.6.6/jquery.contextMenu.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/datatables/1.10.9/css/jquery.dataTables.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/select2/3.5.4/select2.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery-contextmenu/1.6.6/jquery.contextMenu.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/datatables/1.10.9/js/jquery.dataTables.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/moment.js/2.13.0/moment.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/moment-timezone/0.5.4/moment-timezone-with-data.js"></script>

    <!-- google.jsapi 已废弃，仅 visualization 用到，非上传必需，注释掉 -->
    <!-- <script type="text/javascript" src="https://www.google.com/jsapi"></script> -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/3.3.6/css/bootstrap.min.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/3.3.6/js/bootstrap.min.js"></script>

    <script src="https://cdn.bootcdn.net/ajax/libs/flot/0.8.3/jquery.flot.min.js" type="text/javascript"></script>
    <script src="third_party/flot-axislabels/jquery.flot.axislabels.js?ver={{.ResVersion}}" type="text/javascript"></script>
    <!-- jquery.flot.orderBars.js 原 CDN 已失效，仅影响柱状图排序，非上传必需，注释掉 -->
    <!-- <script src="//www.benjaminbuffet.com/public/js/jquery.flot.orderBars.js" type="text/javascript"></script> -->
    <script src="https://cdn.bootcdn.net/ajax/libs/flot/0.8.3/jquery.flot.pie.min.js" type="text/javascript"></script>

    <link type="text/css" rel="stylesheet" href="static/stylesheet.css?ver={{.ResVersion}}">
    <link type="text/css" rel="stylesheet" href="static/historian.css?ver={{.ResVersion}}">
    <link type="text/css" rel="stylesheet" href="static/histogram.css?ver={{.ResVersion}}">
    <link type="text/css" rel="stylesheet" href="static/theme.css?ver={{.ResVersion}}">

    <script src="https://cdn.bootcdn.net/ajax/libs/jquery.form/3.51/jquery.form.min.js" charset="utf-8"></script>

    <script type="text/javascript" src="https://cdn.bootcdn.net/ajax/libs/d3/4.9.1/d3.min.js"></script>
    {{else}}
    <!-- 本地托管模式（默认）：前端依赖置于 static/vendor/，无需外网（离线/内网可用） -->
    <link rel="stylesheet" href="static/vendor/jquery-ui-1.11.4.hot-sneaks.css?ver={{.ResVersion}}">
    <script src="static/vendor/jquery-1.11.2.min.js?ver={{.ResVersion}}"></script>
    <script src="static/vendor/jquery-ui-1.11.2.min.js?ver={{.ResVersion}}"></script>

    <link rel="stylesheet" href="static/vendor/select2-3.5.4.css?ver={{.ResVersion}}">
    <link rel="stylesheet" href="static/vendor/jquery.contextMenu-1.6.6.css?ver={{.ResVersion}}">
    <link rel="stylesheet" href="static/vendor/jquery.dataTables-1.10.9.css?ver={{.ResVersion}}">
    <script src="static/vendor/select2-3.5.4.js?ver={{.ResVersion}}"></script>
    <script src="static/vendor/jquery.contextMenu-1.6.6.js?ver={{.ResVersion}}"></script>
    <script src="static/vendor/jquery.dataTables-1.10.9.js?ver={{.ResVersion}}"></script>
    <script src="static/vendor/moment-2.13.0.js?ver={{.ResVersion}}"></script>
    <script src="static/vendor/moment-timezone-0.5.4.js?ver={{.ResVersion}}"></script>

    <!-- google.jsapi 已废弃，仅 visualization 用到，非上传必需，注释掉 -->
    <!-- <script type="text/javascript" src="https://www.google.com/jsapi"></script> -->
    <link rel="stylesheet" href="static/vendor/bootstrap-3.3.6.min.css?ver={{.ResVersion}}">
    <script src="static/vendor/bootstrap-3.3.6.min.js?ver={{.ResVersion}}"></script>

    <script src="static/vendor/jquery.flot-0.8.3.min.js?ver={{.ResVersion}}" type="text/javascript"></script>
    <script src="third_party/flot-axislabels/jquery.flot.axislabels.js?ver={{.ResVersion}}" type="text/javascript"></script>
    <!-- jquery.flot.orderBars.js 原 CDN 已失效，仅影响柱状图排序，非上传必需，注释掉 -->
    <!-- <script src="//www.benjaminbuffet.com/public/js/jquery.flot.orderBars.js" type="text/javascript"></script> -->
    <script src="static/vendor/jquery.flot.pie-0.8.3.min.js?ver={{.ResVersion}}" type="text/javascript"></script>

    <link type="text/css" rel="stylesheet" href="static/stylesheet.css?ver={{.ResVersion}}">
    <link type="text/css" rel="stylesheet" href="static/historian.css?ver={{.ResVersion}}">
    <link type="text/css" rel="stylesheet" href="static/histogram.css?ver={{.ResVersion}}">
    <link type="text/css" rel="stylesheet" href="static/theme.css?ver={{.ResVersion}}">

    <script src="static/vendor/jquery.form-3.51.min.js?ver={{.ResVersion}}" charset="utf-8"></script>

    <script type="text/javascript" src="static/vendor/d3-4.9.1.min.js?ver={{.ResVersion}}"></script>
    {{end}}
    {{ if .IsOptimizedJs }}
    <script src="compiled/historian-optimized.js?ver={{.ResVersion}}"></script>
    {{ else }}
    <!-- Need to load Closure in header. -->
    <!-- 新版 closure-library 默认 goog.ENABLE_DEBUG_LOADER=false，导致 goog.require 不会动态加载 JS。
         通过 CLOSURE_UNCOMPILED_DEFINES 在 base.js 加载前覆盖该 define，启用 debug loader。 -->
    <script>window.CLOSURE_UNCOMPILED_DEFINES = window.CLOSURE_UNCOMPILED_DEFINES || {}; window.CLOSURE_UNCOMPILED_DEFINES['goog.ENABLE_DEBUG_LOADER'] = true;</script>
    <script type="text/javascript" src="third_party/closure-library/closure/goog/base.js"></script>
    <script type="text/javascript" src="compiled/historian_deps-runfiles.js"></script>
    {{ end }}

    <title>Battery Historian</title>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        var btn = document.getElementById('theme-toggle');
        if (!btn) return;
        function sync() {
          var t = document.documentElement.getAttribute('data-theme');
          btn.textContent = (t === 'dark') ? '浅色' : '深色';
        }
        sync();
        btn.addEventListener('click', function () {
          var cur = document.documentElement.getAttribute('data-theme');
          var next = (cur === 'dark') ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          try { localStorage.setItem('bh-theme', next); } catch (e) {}
          sync();
        });
      });
    </script>
  </head>

  <body>
    <nav class="navbar navbar-inverse navbar-fixed-top">
      <div class="container-fluid">
      <div class="navbar-header">
        <a href="." class="navbar-brand">Battery Historian</a>
        <button id="theme-toggle" type="button" class="navbar-toggle-theme" aria-label="切换深色/浅色主题" title="切换深色/浅色主题">主题</button>
      </div>
        <div id="navbar" class="collapse navbar-collapse">
          <ul id="menu-top" class="nav navbar-nav navbar-right" style="display: none">
            <li class="dropdown sdk-version-21">
              <a href="#" id="views-dropdown" class="dropdown-toggle" data-toggle="dropdown">Views<span class="caret"></span></a>
              <ul id="menu-views" class="dropdown-menu">
                <li><a href="#" id="menu-fileinfo">
                  <span class="glyphicon glyphicon-ok glyphicon-inline-left"></span>
                  <span>File Info</span>
                </a></li>
                <li><a href="#" id="menu-historian">
                  <span class="glyphicon glyphicon-ok glyphicon-inline-left"></span>
                  <span>Historian</span>
                </a></li>
                <li class="comparison"><a href="#" id="menu-historian2">
                  <span class="glyphicon glyphicon-ok glyphicon-inline-left"></span>
                  <span>Historian #2</span>
                </a></li>
                <li class="non-comparison"><a href="#" id="menu-powerstats">
                  <span class="glyphicon glyphicon-ok glyphicon-inline-left"></span>
                  <span>Power Statistics</span>
                </a></li>
              </ul>
            </li>
            <li><a href="." id="new-report">Analyze a new bugreport</a></li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="alert alert-warning historian-note" style="display: none">
      <strong>Note: </strong>
      <span>Note Content</span>
      <button type="button" class="close" data-dismiss="alert">
        <span>&times;</span>
      </button>
    </div>
    <div id="body-contents" class="container-fluid" style="padding-top: 60px">
      {{template "body" .}}
    </div>
    <div class="modal fade" id="dialog" tabindex="-1">
      <div class="modal-dialog modal-lg modal-lgify">
        <div class="modal-content">
          <div class="modal-header">
            <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span>&times;</span></button>
            <h4 class="modal-title"></h4>
          </div>
          <div class="modal-body"></div>
        </div>
      </div>
    </div>
    <div id="copy-content" style="display: none;">
      {{template "copy" .}}
    </div>
  </body>
</html>
